<!DOCTYPE html>
<html lang="En" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectHub - Tasks</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="logo">📊</div>
                <h1>ProjectHub</h1>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html">
                    <span class="icon">🏠</span>
                    <span>Dashboard</span>
                </a>
                <a href="projects.html">
                    <span class="icon">📁</span>
                    <span>Projects</span>
                </a>
                <a href="tasks.html" class="active">
                    <span class="icon">✅</span>
                    <span>Tasks</span>
                </a>
                <a href="users.html">
                    <span class="icon">👥</span>
                    <span>Users</span>
                </a>
            </nav>
            
            <hr class="sidebar-divider">
            
            <div class="sidebar-footer">
                <button class="btn-logout" onclick="logout()">
                    <span>🚪</span>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title">Tasks</h1>
                    <p class="page-subtitle">Manage and track all tasks</p>
                </div>
                <button class="btn btn-primary" onclick="showTaskModal()">
                    <span>+</span>
                    <span>Add New Task</span>
                </button>
            </div>

            <!-- Tasks List -->
            <div class="task-list" id="tasksList">
            </div>

            <!-- Empty State -->
            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-state-icon">✅</div>
                <h3>No tasks yet</h3>
                <p>Create your first task to get started</p>
                <button class="btn btn-primary" onclick="showTaskModal()">Add Task</button>
            </div>
        </main>
    </div>

    <!-- Task Modal -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Add New Task</h3>
                <button class="modal-close" onclick="closeTaskModal()">×</button>
            </div>
            <div class="modal-body">
                <form id="taskForm">
                    <input type="hidden" id="taskId">
                    <div class="form-group">
                        <label>Task Title</label>
                        <input type="text" id="taskTitle" placeholder="Enter task title" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="taskDescription" placeholder="Enter task description" rows="3"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Project</label>
                            <select id="taskProject" required>
                                <option value="">Select Project</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Status</label>
                            <select id="taskStatus">
                                <option value="pending">Pending</option>
                                <option value="in_progress">In Progress</option>
                                <option value="completed">Completed</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeTaskModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveTask()">Save</button>
            </div>
        </div>
    </div>

    <!-- Confirm Dialog -->
    <div class="modal-overlay" id="confirmDialog">
        <div class="modal confirm-dialog">
            <div class="confirm-dialog-icon">⚠️</div>
            <h3 id="confirmTitle">Confirm Delete</h3>
            <p id="confirmMessage">Are you sure you want to delete this item? This action cannot be undone.</p>
            <div class="confirm-dialog-buttons">
                <button class="btn btn-secondary" onclick="closeConfirmDialog()">Cancel</button>
                <button class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/tasks.js"></script>
</body>

</html>
